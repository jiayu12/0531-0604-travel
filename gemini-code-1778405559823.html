<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>峴港旅遊助手</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f4f8; }
        .banner-container { width: 100%; height: 220px; overflow: hidden; position: relative; }
        .banner-image { width: 100%; height: 100%; object-fit: cover; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); }
        .tab-active { color: #fbbf24; border-bottom: 2px solid #fbbf24; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="pb-24">

<div id="app" v-cloak>
    <div class="banner-container shadow-md">
        <img src="61c44a75ebc53187-8dcbb7adb7e1ce7-5e4d3.jpg" 
             @error="handleImgError" 
             class="banner-image">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
        <div class="absolute bottom-4 left-5 text-white">
            <h1 class="text-xl font-bold">峴港五日遊</h1>
            <p class="text-[10px] opacity-70 tracking-widest">2026.05.31 - 06.04</p>
        </div>
    </div>

    <main class="px-4 mt-4">
        
        <div v-if="currentTab === 'itinerary'" class="space-y-3">
            <div v-for="(item, i) in itinerary" :key="i" class="bg-white rounded-2xl p-4 shadow-sm border-l-4 border-blue-400">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded font-bold">{{ item.day }}</span>
                        <h3 class="font-bold text-gray-800 mt-1">{{ item.title }}</h3>
                    </div>
                    <a :href="'https://www.google.com/maps/search/' + item.location" target="_blank" class="p-2 bg-green-500 text-white rounded-xl">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    </a>
                </div>
            </div>
        </div>

        <div v-if="currentTab === 'exchange'" class="bg-white rounded-3xl p-6 shadow-sm border border-blue-50">
            <h3 class="font-bold text-lg mb-4 flex items-center gap-2">💰 匯率換算</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400">台幣 TWD</label>
                    <input type="number" v-model="rates.twd" @input="convert('twd')" class="w-full p-4 bg-gray-50 rounded-2xl border-none text-xl font-bold text-blue-600 focus:ring-2 focus:ring-blue-100">
                </div>
                <div class="text-center text-gray-300">⇅</div>
                <div>
                    <label class="text-xs text-gray-400">越南盾 VND (萬)</label>
                    <input type="number" v-model="rates.vnd" @input="convert('vnd')" class="w-full p-4 bg-green-50 rounded-2xl border-none text-xl font-bold text-green-600 focus:ring-2 focus:ring-green-100">
                </div>
                <p class="text-[10px] text-gray-400 text-center italic">註：1 台幣 ≈ 770 越南盾</p>
            </div>
        </div>

        <div v-if="currentTab === 'weather'" class="space-y-4">
            <div class="bg-gradient-to-br from-sky-500 to-blue-600 rounded-3xl p-6 text-white shadow-lg">
                <div class="flex justify-between items-center">
                    <div>
                        <p class="text-xs opacity-80">越南 峴港市</p>
                        <h2 class="text-4xl font-bold">29°C</h2>
                        <p class="text-sm mt-2 font-light">多雲轉晴 🌤️</p>
                    </div>
                    <img src="https://openweathermap.org/img/wn/02d@2x.png" class="w-20">
                </div>
                <div class="mt-4 pt-4 border-t border-white/20 text-[11px] opacity-80">
                    提醒：六月天氣炎熱，請準備好防曬與足夠的水。
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-5 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-nav rounded-full px-4 py-3 flex justify-around shadow-xl z-50">
        <button @click="currentTab = 'itinerary'" :class="{ 'tab-active': currentTab === 'itinerary' }" class="flex flex-col items-center text-gray-400 p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            <span class="text-[10px] mt-1">行程</span>
        </button>
        <button @click="currentTab = 'exchange'" :class="{ 'tab-active': currentTab === 'exchange' }" class="flex flex-col items-center text-gray-400 p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] mt-1">換匯</span>
        </button>
        <button @click="currentTab = 'weather'" :class="{ 'tab-active': currentTab === 'weather' }" class="flex flex-col items-center text-gray-400 p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
            <span class="text-[10px] mt-1">天氣</span>
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, reactive } = Vue;
    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const itinerary = [
                { day: "Day 1", title: "高雄 ➔ 峴港 ➔ 會安古鎮", location: "Hoi An Ancient Town" },
                { day: "Day 2", title: "迦南島竹桶船 ➔ 樂釣螃蟹", location: "Cam Thanh Coconut Village" },
                { day: "Day 3", title: "南會安野生動物園 ➔ 韓江遊船", location: "Vinpearl River Safari South Hoi An" },
                { day: "Day 4", title: "巴拿山法國山城 ➔ 佛手橋", location: "Golden Bridge Ba Na Hills" },
                { day: "Day 5", title: "五行山 ➔ 粉紅教堂 ➔ 賦歸", location: "Da Nang Cathedral" }
            ];
            
            const rates = reactive({ twd: 100, vnd: 7.7 });
            const convert = (type) => {
                if (type === 'twd') rates.vnd = Number((rates.twd * 0.077).toFixed(2));
                else rates.twd = Number((rates.vnd / 0.077).toFixed(0));
            };

            const handleImgError = (e) => {
                // 如果圖片載入失敗，給一個預設背景色以免畫面空空的
                e.target.style.display = 'none';
                e.target.parentNode.style.backgroundColor = '#1e293b';
            };

            return { currentTab, itinerary, rates, convert, handleImgError };
        }
    }).mount('#app');
</script>
</body>
</html>
