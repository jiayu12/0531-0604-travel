<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>峴港五日遊 | Da Nang Travel App</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F0F4F7; }
        .banner-container { width: 100%; height: 250px; overflow: hidden; position: relative; }
        .banner-image { width: 100%; height: 100%; object-fit: cover; object-position: center; }
        .tab-active { color: #0056b3; background-color: #FFFDE7; border-radius: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-28">

<div id="app">
    <div class="banner-container shadow-lg">
        <img src="https://jiayu12.github.io/0531-0604-travel/61c44a75ebc53187-8dcbb7adb7e1ce7-5e4d3.jpg" alt="Da Nang Night" class="banner-image">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
        <div class="absolute bottom-6 left-6 text-white animate-fade-in">
            <h1 class="text-2xl font-bold tracking-wider">峴港五日遊</h1>
            <p class="text-sm opacity-90 font-light uppercase tracking-widest">2026.05.31 - 06.04</p>
        </div>
    </div>

    <main class="px-4 mt-[-15px] relative z-10">
        <div class="flex bg-white/90 backdrop-blur rounded-2xl p-1.5 shadow-md mb-6 sticky top-4 z-20">
            <button v-for="tab in tabs" :key="tab.id" @click="currentTab = tab.id"
                    :class="['flex-1 py-3 text-sm font-bold transition-all', currentTab === tab.id ? 'tab-active' : 'text-gray-400']">
                {{ tab.name }}
            </button>
        </div>

        <div v-if="currentTab === 'itinerary'" class="space-y-4 animate-fade-in">
            <div v-for="(item, index) in itinerary" :key="index" class="bg-white rounded-3xl p-5 shadow-sm border-b-4 border-green-400">
                <div class="flex justify-between items-start gap-3">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-black text-white bg-blue-500 px-2.5 py-1 rounded-full uppercase">{{ item.day }}</span>
                            <span class="text-xs text-gray-400 font-medium">{{ item.date }}</span>
                        </div>
                        <h3 class="font-bold text-lg text-gray-800 mt-2.5">{{ item.title }}</h3>
                        <p class="text-xs text-gray-500 mt-1.5 flex items-center gap-1.5">📍 {{ item.location }}</p>
                    </div>
                    <a :href="'http://googleusercontent.com/maps.google.com/3' + encodeURIComponent(item.location)" target="_blank"
                       class="bg-green-500 text-white p-3.5 rounded-2xl shadow-lg active:scale-95 transition-transform">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </a>
                </div>
                <textarea v-model="item.journal" placeholder="寫下旅遊筆記或是晚餐想吃的餐廳..." 
                          class="w-full mt-4 p-4 bg-blue-50/50 border-none rounded-2xl text-sm text-gray-600 focus:ring-2 focus:ring-blue-100 h-28 resize-none"></textarea>
            </div>
        </div>

        <div v-if="currentTab === 'budget'"> </div>
        <div v-if="currentTab === 'wishlist'"> </div>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-gray-900/90 backdrop-blur-xl rounded-full flex justify-around py-4 shadow-2xl z-50 border border-gray-700/50">
        </nav>
</div>

<script>
    const { createApp, ref, computed, watchEffect } = Vue;
    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const tabs = [{ id: 'itinerary', name: '行程導航' }, { id: 'budget', name: '旅費記帳' }, { id: 'wishlist', name: '願望清單' }];

            // 資料初始化 (對齊 PDF 行程)
            const itinerary = ref(JSON.parse(localStorage.getItem('travel_data')) || [
                { day: "Day 1", date: "5/31", title: "高雄 ➔ 峴港 ➔ 會安古鎮漫遊", location: "Hoi An Ancient Town", journal: "" },
                { day: "Day 2", date: "6/01", title: "迦南島竹桶船 ➔ 樂釣螃蟹", location: "Cam Thanh Coconut Village", journal: "" },
                { day: "Day 3", date: "6/02", title: "南會安野生動物園 ➔ 韓江遊船", location: "Vinpearl River Safari South Hoi An", journal: "" },
                { day: "Day 4", date: "6/03", title: "巴拿山法國山城 ➔ 佛手橋", location: "Golden Bridge Ba Na Hills", journal: "" },
                { day: "Day 5", date: "6/04", title: "五行山 ➔ 粉紅教堂 ➔ 賦歸", location: "Da Nang Cathedral", journal: "" }
            ]);

            // 自動存檔
            watchEffect(() => { localStorage.setItem('travel_data', JSON.stringify(itinerary.value)); });

            return { currentTab, tabs, itinerary };
        }
    }).mount('#app');
</script>
</body>
</html>
