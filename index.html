<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>峴港旅遊助手</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .header-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .tab-active { color: #fbbf24; border-bottom: 2px solid #fbbf24; }
        [v-cloak] { display: none; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        /* 展開動畫 */
        .expand-enter-active, .expand-leave-active { transition: all 0.3s ease; max-height: 500px; overflow: hidden; }
        .expand-enter-from, .expand-leave-to { max-height: 0; opacity: 0; }
    </style>
</head>
<body class="pb-28">

<div id="app" v-cloak>
    <header class="header-gradient pt-12 pb-16 px-6 text-white rounded-b-[3rem] shadow-lg">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">峴港五日遊</h1>
                <p class="text-xs opacity-70 mt-1 tracking-widest text-blue-100">DETAILED ITINERARY</p>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-2xl p-2 px-3 border border-white/10 text-center">
                <p class="text-[10px] font-bold">峴港</p>
                <p class="text-sm">29°C 🌤️</p>
            </div>
        </div>
    </header>

    <main class="px-5 mt-[-30px] relative z-10">
        
        <div v-if="currentTab === 'itinerary'" class="space-y-4">
            <div v-for="(item, i) in itinerary" :key="i" class="bg-white rounded-[2rem] card-shadow overflow-hidden border border-gray-50">
                <div @click="toggleDay(i)" class="p-5 flex items-center justify-between cursor-pointer active:bg-gray-50">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{{ item.day }}</span>
                            <span class="text-[10px] text-gray-400 font-medium">{{ item.date }}</span>
                        </div>
                        <h3 class="font-bold text-gray-800 mt-2 leading-snug">{{ item.title }}</h3>
                    </div>
                    <div class="flex items-center gap-3">
                        <button @click.stop="openMap(item.searchKey)" class="bg-green-500 text-white p-3 rounded-xl shadow-md active:scale-90 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                        <svg class="w-5 h-5 text-gray-300 transition-transform duration-300" :class="{ 'rotate-180': expandedDay === i }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                </div>

                <transition name="expand">
                    <div v-show="expandedDay === i" class="px-6 pb-6 pt-2 bg-slate-50/50 border-t border-gray-50">
                        <ul class="space-y-3">
                            <li v-for="(detail, idx) in item.details" :key="idx" class="flex gap-3 text-sm">
                                <span class="text-blue-400 font-bold">•</span>
                                <span class="text-gray-600 leading-relaxed">{{ detail }}</span>
                            </li>
                        </ul>
                    </div>
                </transition>
            </div>
        </div>

        <div v-if="currentTab === 'wishlist'" class="bg-white rounded-[2.5rem] p-6 card-shadow border border-gray-50">
            <h3 class="font-bold text-xl mb-4 text-gray-800">🛒 願望清單</h3>
            <div class="flex gap-2 mb-6">
                <input v-model="newWish" @keyup.enter="addWish" type="text" placeholder="想買什麼？" class="flex-1 bg-gray-50 border-none rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-100">
                <button @click="addWish" class="bg-blue-600 text-white px-4 rounded-xl">+</button>
            </div>
            <div class="space-y-2">
                <div v-for="(wish, index) in wishes" :key="index" @click="toggleWish(index)" :class="{ 'opacity-40 line-through': wish.done }" class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                    <span class="text-sm">{{ wish.text }}</span>
                    <button @click.stop="removeWish(index)" class="text-gray-300">✕</button>
                </div>
            </div>
        </div>

        <div v-if="currentTab === 'exchange'" class="bg-white rounded-[2.5rem] p-8 card-shadow">
            <h3 class="font-bold text-xl mb-6 text-gray-800">💰 匯率換算</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-xs text-gray-400 ml-2">台幣 TWD</label>
                    <input type="number" v-model="rates.twd" @input="convert('twd')" class="w-full p-4 bg-gray-50 rounded-2xl border-none text-2xl font-bold text-blue-600 outline-none">
                </div>
                <div class="text-center text-gray-200">⇅</div>
                <div>
                    <label class="text-xs text-gray-400 ml-2">越南盾 VND (萬)</label>
                    <input type="number" v-model="rates.vnd" @input="convert('vnd')" class="w-full p-4 bg-green-50 rounded-2xl border-none text-2xl font-bold text-green-600 outline-none">
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] max-w-sm glass-nav rounded-full px-2 py-3 flex justify-around shadow-2xl z-50 border border-white/10">
        <button @click="currentTab = 'itinerary'" :class="{ 'tab-active': currentTab === 'itinerary' }" class="flex flex-col items-center text-gray-500 px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            <span class="text-[9px] mt-1 font-bold">詳細行程</span>
        </button>
        <button @click="currentTab = 'wishlist'" :class="{ 'tab-active': currentTab === 'wishlist' }" class="flex flex-col items-center text-gray-500 px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
            <span class="text-[9px] mt-1 font-bold">願望清單</span>
        </button>
        <button @click="currentTab = 'exchange'" :class="{ 'tab-active': currentTab === 'exchange' }" class="flex flex-col items-center text-gray-500 px-4 py-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[9px] mt-1 font-bold">即時換匯</span>
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, reactive, watch } = Vue;
    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const expandedDay = ref(0); // 預設展開第一天

            const toggleDay = (index) => {
                expandedDay.value = expandedDay.value === index ? null : index;
            };

            const itinerary = [
                { 
                    day: "Day 1", date: "5/31", title: "小港機場出發 ➔ 會安古鎮夜遊", 
                    details: [
                        "12:00 高雄小港機場集合",
                        "搭乘航班前往峴港 (Danang)",
                        "專車前往會安 (Hoi An) 辦理入住",
                        "夜遊會安古鎮：福建會館、日本橋、陳家祠堂",
                        "Nguyễn Hoàng 夜市燈籠拍照、放水燈體驗"
                    ],
                    searchKey: "Nguyễn Hoàng, An Hội, Hội An, Vietnam"
                },
                { 
                    day: "Day 2", date: "6/01", title: "迦南島體驗 ➔ 燈籠 DIY", 
                    details: [
                        "迦南島 (Cam Thanh) 竹桶船體驗",
                        "樂釣螃蟹與傳統網魚演示",
                        "手作燈籠 DIY 體驗、下午茶時間",
                        "會安傳統市場深度探索"
                    ],
                    searchKey: "Cam Thanh Coconut Village"
                },
                { 
                    day: "Day 3", date: "6/02", title: "南會安野生動物園 ➔ 韓江遊船", 
                    details: [
                        "Vinpearl River Safari：坐船看野生動物",
                        "漫步南會安主題樂園、傳統藝術表演",
                        "回到峴港市區、晚餐時光",
                        "夜間韓江 (Han River) 巡遊，欣賞龍橋燈光秀"
                    ],
                    searchKey: "Vinpearl River Safari South Hoi An"
                },
                { 
                    day: "Day 4", date: "6/03", title: "巴拿山法國山城 ➔ 佛手橋", 
                    details: [
                        "巴拿山 (Ba Na Hills) 登頂纜車",
                        "漫步佛手橋 (Golden Bridge) 雲端絕景",
                        "法國山城、靈應寺拍照、Fantasy Park 遊樂園",
                        "品嚐山城自助午餐"
                    ],
                    searchKey: "Ba Na Hills Sun World"
                },
                { 
                    day: "Day 5", date: "6/04", title: "五行山 ➔ 粉紅教堂 ➔ 賦歸", 
                    details: [
                        "五行山 (Marble Mountains) 搭乘電梯登高",
                        "參觀玄空洞、眺望峴港海岸線",
                        "峴港粉紅教堂 (Da Nang Cathedral)",
                        "漢市場 (Han Market) 最後採買",
                        "前往峴港機場，帶著滿滿回憶回高雄"
                    ],
                    searchKey: "Da Nang Cathedral"
                }
            ];

            // 願望清單持久化
            const wishes = ref(JSON.parse(localStorage.getItem('trip-wishes') || '[]'));
            const newWish = ref('');
            const addWish = () => { if (newWish.value.trim()) { wishes.value.push({ text: newWish.value, done: false }); newWish.value = ''; } };
            const toggleWish = (index) => { wishes.value[index].done = !wishes.value[index].done; };
            const removeWish = (index) => { wishes.value.splice(index, 1); };
            watch(wishes, (val) => { localStorage.setItem('trip-wishes', JSON.stringify(val)); }, { deep: true });

            // 換匯計算
            const rates = reactive({ twd: 100, vnd: 7.7 });
            const convert = (type) => {
                if (type === 'twd') rates.vnd = Number((rates.twd * 0.077).toFixed(2));
                else rates.twd = Number((rates.vnd / 0.077).toFixed(0));
            };

            const openMap = (query) => { window.open(`http://googleusercontent.com/maps.google.com/6{encodeURIComponent(query)}`, '_blank'); };

            return { currentTab, expandedDay, toggleDay, itinerary, wishes, newWish, addWish, toggleWish, removeWish, rates, convert, openMap };
        }
    }).mount('#app');
</script>
</body>
</html>
