                        <h3 class="font-bold text-lg text-gray-800 mt-2.5">{{ item.title }}</h3>
                        <p class="text-xs text-gray-500 mt-1.5 flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            {{ item.location }}
                        </p>
                    </div>
                    <a :href="'http://googleusercontent.com/maps.google.com/2' + encodeURIComponent(item.location)" 
                       target="_blank"
                       class="bg-green-500 text-white p-3.5 rounded-2xl shadow-lg shadow-green-100 active:scale-95 transition-transform flex-shrink-0">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </a>
                </div>
                <textarea v-model="item.journal" placeholder="✍️ 點擊這裡紀錄這趟旅程的心情或備忘..." 
                          class="w-full mt-4 p-4 bg-blue-50/50 border-none rounded-2xl text-sm text-gray-600 focus:ring-2 focus:ring-blue-100 h-28 resize-none"></textarea>
            </div>
        </div>

        <div v-if="currentTab === 'budget'" class="space-y-4 animate-fade-in">
            <div class="bg-gradient-to-br from-blue-600 to-blue-400 rounded-[2rem] p-8 text-white shadow-xl shadow-blue-100">
                <p class="text-center text-blue-100 text-sm mb-2 font-medium tracking-wide">Total Expenses</p>
                <h2 class="text-center text-4xl font-bold mb-6 tracking-tight">NT$ {{ totalBudget }}</h2>
                <div class="grid grid-cols-2 gap-3.5">
                    <input v-model="newExpense.name" type="text" placeholder="項目 (如：午餐)" class="p-4 bg-white/20 rounded-xl border-none placeholder-white/60 text-white focus:ring-white focus:ring-2">
                    <input v-model.number="newExpense.amount" type="number" placeholder="金額 (TWD)" class="p-4 bg-white/20 rounded-xl border-none placeholder-white/60 text-white focus:ring-white focus:ring-2">
                </div>
                <button @click="addExpense" class="w-full mt-4 bg-yellow-400 text-blue-900 py-4 rounded-2xl font-black shadow-lg shadow-yellow-200 active:scale-98 transition">新增一筆支出</button>
            </div>
            <div class="bg-white rounded-3xl p-5 shadow-sm">
                <h4 class="text-sm font-bold text-gray-400 mb-2 px-2">消費明細</h4>
                <div v-for="(exp, i) in expenses" :key="i" class="flex justify-between items-center py-4 border-b border-gray-50 last:border-0animate-fade-in">
                    <div class="flex items-center gap-3.5">
                        <div class="w-2.5 h-2.5 bg-green-400 rounded-full flex-shrink-0"></div>
                        <span class="text-gray-700 font-medium">{{ exp.name }}</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-gray-900 text-lg">$ {{ exp.amount }}</span>
                        <button @click="expenses.splice(i, 1)" class="text-red-300 hover:text-red-500 transition text-xs">刪除</button>
                    </div>
                </div>
                <p v-if="expenses.length === 0" class="text-center text-gray-400 py-8 text-sm">目前還沒有記帳紀錄喔！</p>
            </div>
        </div>

        <div v-if="currentTab === 'wishlist'" class="space-y-3.5 animate-fade-in">
            <div class="bg-white rounded-3xl p-3 shadow-sm flex gap-2 border border-gray-100">
                <input v-model="newWish" type="text" placeholder="想買的伴手禮 (如：腰果)..." class="flex-1 p-4 bg-gray-50 rounded-2xl border-none focus:ring-gray-100 focus:ring-2">
                <button @click="addWish" class="bg-blue-600 text-white px-7 rounded-2xl font-bold active:scale-95 transition">新增</button>
            </div>
            <div v-for="(wish, i) in wishes" :key="i" 
                 class="bg-white p-5 rounded-2xl flex items-center gap-4 shadow-sm group hover:shadow-md transition">
                <input type="checkbox" class="w-6 h-6 rounded-lg border-blue-200 text-blue-600 focus:ring-0">
                <span class="text-gray-700 flex-1 font-medium group-hover:text-gray-900">{{ wish }}</span>
                <button @click="wishes.splice(i, 1)" class="text-gray-200 group-hover:text-red-300 transition">✕</button>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-gray-900/90 backdrop-blur-xl rounded-full flex justify-around py-4 shadow-2xl z-50 border border-gray-700/50">
        <button @click="currentTab = 'itinerary'" :class="currentTab === 'itinerary' ? 'text-yellow-400' : 'text-gray-500'">
            <div class="flex flex-col items-center px-4 active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                <span class="text-[10px] mt-1.5 font-bold tracking-wider">行程導航</span>
            </div>
        </button>
        <button @click="currentTab = 'budget'" :class="currentTab === 'budget' ? 'text-yellow-400' : 'text-gray-500'">
            <div class="flex flex-col items-center px-4 active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                <span class="text-[10px] mt-1.5 font-bold tracking-wider">旅費記帳</span>
            </div>
        </button>
        <button @click="currentTab = 'wishlist'" :class="currentTab === 'wishlist' ? 'text-yellow-400' : 'text-gray-500'">
            <div class="flex flex-col items-center px-4 active:scale-90 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span class="text-[10px] mt-1.5 font-bold tracking-wider">願望清單</span>
            </div>
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, computed, watchEffect } = Vue;

    createApp({
        setup() {
            // Tab 管理
            const currentTab = ref('itinerary');
            const tabs = [
                { id: 'itinerary', name: '行程導航' },
                { id: 'budget', name: '旅費記帳' },
                { id: 'wishlist', name: '願望清單' }
            ];

            // 從 LocalStorage 載入資料的輔助函式
            const getSavedData = (key, defaultVal) => JSON.parse(localStorage.getItem(key)) || defaultVal;

            // --- 行程資料 ---
            const itinerary = ref(getSavedData('danang_itin_v3', [
                { day: "Day 1", date: "5/31", title: "會安古鎮漫遊", location: "Hoi An Ancient Town", journal: "" },
                { day: "Day 2", date: "6/01", title: "迦南島竹桶船生态遊", location: "Cam Thanh Coconut Village", journal: "" },
                { day: "Day 3", date: "6/02", title: "南會安野生動物園", location: "Vinpearl River Safari South Hoi An", journal: "" },
                { day: "Day 4", date: "6/03", title: "巴拿山黃金佛手橋", location: "Golden Bridge Ba Na Hills", journal: "" },
                { day: "Day 5", date: "6/04", title: "峴港粉紅教堂 & 五行山", location: "Da Nang Cathedral", journal: "" }
            ]));

            // --- 記帳資料 ---
            const expenses = ref(getSavedData('danang_exp_v3', []));
            const newExpense = ref({ name: '', amount: null });
            const totalBudget = computed(() => expenses.value.reduce((sum, exp) => sum + Number(exp.amount), 0));
            const addExpense = () => {
                if(newExpense.value.name && newExpense.value.amount) {
                    expenses.value.unshift({...newExpense.value}); // 新增的排在前面
                    newExpense.value = { name: '', amount: null };
                }
            };

            // --- 願望清單資料 ---
            const wishes = ref(getSavedData('danang_wish_v3', ["腰果", "G7 咖啡", "芒果乾", "越南編織包"]));
            const newWish = ref('');
            const addWish = () => {
                if(newWish.value) {
                    wishes.value.push(newWish.value);
                    newWish.value = '';
                }
            };

            // --- 自動存檔 (監聽資料變化並寫入 LocalStorage) ---
            watchEffect(() => {
                localStorage.setItem('danang_itin_v3', JSON.stringify(itinerary.value));
                localStorage.setItem('danang_exp_v3', JSON.stringify(expenses.value));
                localStorage.setItem('danang_wish_v3', JSON.stringify(wishes.value));
            });

            return { currentTab, tabs, itinerary, expenses, newExpense, totalBudget, addExpense, wishes, newWish, addWish };
        }
    }).mount('#app');
</script>
</body>
</html>
