<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>峴港旅遊助手</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .header-gradient { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); }
        .tab-active { color: #fbbf24; border-bottom: 2px solid #fbbf24; }
        [v-cloak] { display: none; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .nav-btn:active { transform: scale(0.9); transition: 0.1s; }
    </style>
</head>
<body class="pb-28">

<div id="app" v-cloak>
    <header class="header-gradient pt-12 pb-16 px-6 text-white rounded-b-[3rem] shadow-lg">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">峴港五日遊</h1>
                <p class="text-xs opacity-70 mt-1 tracking-widest text-blue-100">DA NANG TRAVEL • 2026</p>
            </div>
            <div class="bg-white/10 backdrop-blur-md rounded-2xl p-2 px-3 border border-white/10">
                <p class="text-[10px] font-bold opacity-80">峴港即時</p>
                <p class="text-sm font-bold">29°C 🌤️</p>
            </div>
        </div>
    </header>

    <main class="px-5 mt-[-30px] relative z-10">
        
        <div v-if="currentTab === 'itinerary'" class="space-y-4">
            <div v-for="(item, i) in itinerary" :key="i" class="bg-white rounded-3xl p-5 card-shadow flex items-center justify-between border border-gray-50">
                <div class="flex-1 pr-4">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">{{ item.day }}</span>
                        <span class="text-[10px] text-gray-400 font-medium">{{ item.date }}</span>
                    </div>
                    <h3 class="font-bold text-gray-800 mt-2 leading-snug">{{ item.title }}</h3>
                    <p class="text-[10px] text-gray-400 mt-1 flex items-start gap-1">
                        <svg class="w-3 h-3 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                        </svg>
                        <span>{{ item.locationDisplay }}</span>
                    </p>
                </div>
                
                <button @click="openMap(item.searchKey)" 
                        class="nav-btn bg-green-500 hover:bg-green-600 text-white p-4 rounded-2xl shadow-lg shadow-green-100 flex-shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div v-if="currentTab === 'exchange'" class="bg-white rounded-[2.5rem] p-8 card-shadow">
            <h3 class="font-bold text-xl mb-6 text-gray-800">💰 匯率換算</h3>
            <div class="space-y-5">
                <div>
                    <label class="text-xs text-gray-400 ml-2 block">台幣 TWD</label>
                    <input type="number" v-model="rates.twd" @input="convert('twd')" class="w-full p-4 bg-gray-50 rounded-2xl border-none text-2xl font-bold text-blue-600">
                </div>
                <div class="text-center text-gray-200">⇅</div>
                <div>
                    <label class="text-xs text-gray-400 ml-2 block">越南盾 VND (萬)</label>
                    <input type="number" v-model="rates.vnd" @input="convert('vnd')" class="w-full p-4 bg-green-50 rounded-2xl border-none text-2xl font-bold text-green-600">
                </div>
            </div>
        </div>

        <div v-if="currentTab === 'weather'">
            <div class="bg-white rounded-[2.5rem] p-8 card-shadow text-center">
                <img src="https://openweathermap.org/img/wn/02d@2x.png" class="w-24 h-24 mx-auto">
                <h2 class="text-5xl font-bold text-gray-800">29°C</h2>
                <p class="text-blue-500 font-medium mt-2">峴港市 • 多雲轉晴</p>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-nav rounded-full px-4 py-3 flex justify-around shadow-2xl z-50 border border-white/10">
        <button @click="currentTab = 'itinerary'" :class="{ 'tab-active': currentTab === 'itinerary' }" class="flex flex-col items-center text-gray-500 p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
            <span class="text-[10px] mt-1 font-bold">行程導航</span>
        </button>
        <button @click="currentTab = 'exchange'" :class="{ 'tab-active': currentTab === 'exchange' }" class="flex flex-col items-center text-gray-500 p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span class="text-[10px] mt-1 font-bold">即時換匯</span>
        </button>
        <button @click="currentTab = 'weather'" :class="{ 'tab-active': currentTab === 'weather' }" class="flex flex-col items-center text-gray-500 p-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
            <span class="text-[10px] mt-1 font-bold">天氣預報</span>
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, reactive } = Vue;
    createApp({
        setup() {
            const currentTab = ref('itinerary');
            
            const itinerary = [
                { 
                    day: "Day 1", date: "5/31", 
                    title: "小港機場 ➔ 峴港 ➔ 會安古鎮夜遊", 
                    locationDisplay: "高雄小港機場 / Danang Airport / Nguyễn Hoàng, Hội An",
                    searchKey: "Nguyễn Hoàng, An Hội, Hội An, Quảng Nam, Vietnam" // 使用您提供的詳細地址
                },
                { 
                    day: "Day 2", date: "6/01", 
                    title: "迦南島竹桶船體驗", 
                    locationDisplay: "Cam Thanh Coconut Village",
                    searchKey: "Cam Thanh Coconut Village"
                },
                { 
                    day: "Day 3", date: "6/02", 
                    title: "南會安野生動物園 ➔ 韓江遊船", 
                    locationDisplay: "Vinpearl River Safari / Han River Cruise",
                    searchKey: "Vinpearl River Safari South Hoi An"
                },
                { 
                    day: "Day 4", date: "6/03", 
                    title: "巴拿山法國山城 ➔ 佛手橋", 
                    locationDisplay: "Ba Na Hills Sun World",
                    searchKey: "Ba Na Hills Sun World"
                },
                { 
                    day: "Day 5", date: "6/04", 
                    title: "五行山 ➔ 峴港粉紅教堂 ➔ 賦歸", 
                    locationDisplay: "Marble Mountains / Da Nang Cathedral / Danang Airport",
                    searchKey: "Da Nang Cathedral"
                }
            ];
            
            const openMap = (query) => {
                const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
                window.open(url, '_blank');
            };

            const rates = reactive({ twd: 100, vnd: 7.7 });
            const convert = (type) => {
                if (type === 'twd') rates.vnd = Number((rates.twd * 0.077).toFixed(2));
                else rates.twd = Number((rates.vnd / 0.077).toFixed(0));
            };

            return { currentTab, itinerary, rates, convert, openMap };
        }
    }).mount('#app');
</script>
</body>
</html>
