<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Nang Travel App</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F7F9FB; }
        .tab-active { color: #0066FF; border-bottom: 3px solid #0066FF; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        /* 隱藏捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24">

<div id="app">
    <div class="relative w-full h-[250px] overflow-hidden shadow-lg">
        <img src="https://images.unsplash.com/photo-1559592442-741eaf7397b6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" 
             alt="Da Nang Airport" class="w-full h-full object-cover">
        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/60 to-transparent">
            <h1 class="text-white text-2xl font-bold">115.5.31 峴港五日遊</h1>
            <p class="text-white/80 text-sm italic">Da Nang, Vietnam - Summer Breeze</p>
        </div>
    </div>

    <main class="px-5 mt-[-20px] relative z-10">
        
        <div class="flex justify-between bg-white rounded-2xl p-2 shadow-sm mb-6 no-scrollbar overflow-x-auto">
            <button v-for="tab in tabs" :key="tab.id" 
                    @click="currentTab = tab.id"
                    :class="['flex-1 py-3 text-sm font-bold transition-all', currentTab === tab.id ? 'text-blue-600 bg-blue-50 rounded-xl' : 'text-gray-400']">
                {{ tab.name }}
            </button>
        </div>

        <div v-if="currentTab === 'itinerary'" class="space-y-4">
            <div v-for="(item, index) in itinerary" :key="index" class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-yellow-400 hover:shadow-md transition">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <span class="text-xs font-bold text-green-600 bg-green-50 px-2 py-1 rounded-md">{{ item.day }}</span>
                        <h3 class="font-bold text-lg text-gray-800 mt-1">{{ item.title }}</h3>
                    </div>
                    <a :href="'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(item.location)" 
                       target="_blank"
                       class="bg-blue-600 text-white p-2 rounded-full shadow-lg hover:bg-blue-700">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
                        </svg>
                    </a>
                </div>
                <textarea v-model="item.journal" placeholder="在此紀錄當下感動與筆記..." 
                          class="w-full mt-3 p-3 bg-gray-50 border-none rounded-xl text-sm text-gray-600 focus:ring-2 focus:ring-blue-100 h-24"></textarea>
            </div>
        </div>

        <div v-if="currentTab === 'budget'" class="space-y-4">
            <div class="bg-white rounded-3xl p-6 shadow-sm border-2 border-green-100">
                <h2 class="font-bold text-gray-700 mb-4 text-center">總花費估算</h2>
                <div class="text-center text-4xl font-bold text-green-600 mb-6">NT$ {{ totalBudget }}</div>
                <div class="space-y-3">
                    <input v-model="newExpense.name" type="text" placeholder="項目說明" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                    <input v-model.number="newExpense.amount" type="number" placeholder="金額 (TWD)" class="w-full p-4 bg-gray-50 rounded-2xl border-none">
                    <button @click="addExpense" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200">新增這筆花費</button>
                </div>
            </div>
            <div class="bg-white rounded-3xl p-6 shadow-sm">
                <div v-for="(exp, i) in expenses" :key="i" class="flex justify-between py-3 border-b border-gray-50 last:border-0">
                    <span class="text-gray-600">{{ exp.name }}</span>
                    <span class="font-bold text-gray-800">$ {{ exp.amount }}</span>
                </div>
            </div>
        </div>

        <div v-if="currentTab === 'wishlist'" class="space-y-3">
            <div class="flex gap-2 mb-4">
                <input v-model="newWish" type="text" placeholder="想買的伴手禮..." class="flex-1 p-4 bg-white rounded-2xl shadow-sm border-none">
                <button @click="addWish" class="bg-yellow-400 text-white px-6 rounded-2xl font-bold">＋</button>
            </div>
            <div v-for="(wish, i) in wishes" :key="i" 
                 class="bg-white p-4 rounded-2xl flex items-center gap-3 shadow-sm">
                <input type="checkbox" class="w-5 h-5 rounded-full border-gray-300 text-blue-600">
                <span class="text-gray-700 flex-1">{{ wish }}</span>
                <button @click="wishes.splice(i, 1)" class="text-red-300">✕</button>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around py-4 z-50">
        <button @click="currentTab = 'itinerary'" :class="currentTab === 'itinerary' ? 'text-blue-600' : 'text-gray-400'">
            <div class="flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                <span class="text-[10px] mt-1 font-bold">行程</span>
            </div>
        </button>
        <button @click="currentTab = 'budget'" :class="currentTab === 'budget' ? 'text-blue-600' : 'text-gray-400'">
            <div class="flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                <span class="text-[10px] mt-1 font-bold">記帳</span>
            </div>
        </button>
        <button @click="currentTab = 'wishlist'" :class="currentTab === 'wishlist' ? 'text-blue-600' : 'text-gray-400'">
            <div class="flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span class="text-[10px] mt-1 font-bold">願望</span>
            </div>
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, computed, watchEffect } = Vue;

    createApp({
        setup() {
            const currentTab = ref('itinerary');
            const tabs = [
                { id: 'itinerary', name: '行程導航' },
                { id: 'budget', name: '旅費支出' },
                { id: 'wishlist', name: '願望清單' }
            ];

            // 初始資料載入 (從 LocalStorage)
            const getSavedData = (key, defaultVal) => JSON.parse(localStorage.getItem(key)) || defaultVal;

            const itinerary = ref(getSavedData('danang_itinerary', [
                { day: "Day 1", title: "高雄 ➔ 峴港 ➔ 會安古鎮", location: "Hoi An Ancient Town", journal: "" },
                { day: "Day 2", title: "迦南島竹桶船 ➔ 樂釣螃蟹", location: "Cam Thanh Coconut Village", journal: "" },
                { day: "Day 3", title: "野生動物園 ➔ 韓江遊船", location: "Vinpearl River Safari South Hoi An", journal: "" },
                { day: "Day 4", title: "巴拿山佛手橋 ➔ 龍橋", location: "Bana Hills Golden Bridge", journal: "" },
                { day: "Day 5", title: "五行山 ➔ 粉紅教堂 ➔ 回家", location: "Da Nang Cathedral", journal: "" }
            ]));

            const expenses = ref(getSavedData('danang_expenses', []));
            const newExpense = ref({ name: '', amount: null });

            const wishes = ref(getSavedData('danang_wishes', ["G7 咖啡", "越南腰果", "編織包"]));
            const newWish = ref('');

            // 計算總額
            const totalBudget = computed(() => expenses.value.reduce((sum, exp) => sum + Number(exp.amount), 0));

            // 方法
            const addExpense = () => {
                if(newExpense.value.name && newExpense.value.amount) {
                    expenses.value.push({...newExpense.value});
                    newExpense.value = { name: '', amount: null };
                }
            };

            const addWish = () => {
                if(newWish.value) {
                    wishes.value.push(newWish.value);
                    newWish.value = '';
                }
            };

            // 自動存檔
            watchEffect(() => {
                localStorage.setItem('danang_itinerary', JSON.stringify(itinerary.value));
                localStorage.setItem('danang_expenses', JSON.stringify(expenses.value));
                localStorage.setItem('danang_wishes', JSON.stringify(wishes.value));
            });

            return { currentTab, tabs, itinerary, expenses, newExpense, totalBudget, addExpense, wishes, newWish, addWish };
        }
    }).mount('#app');
</script>
</body>
</html>
